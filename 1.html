<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            background-color: #cdd1d3;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
        }

        .blue-background {
            background-color: #93b5cf;
            color: #ffffff;
            padding: 10px;
            font-weight: bold;
            flex: 1;
        }

        .white-background {
            background-color: #ffffff;
            padding: 10px;
            flex: 3;
        }

        .no-wrap {
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="blue-background">证书编号：</div>
        <div class="white-background">SL-2023022400386</div>
    </div>
    <div class="container">
        <div class="blue-background">送检单位：</div>
        <div class="white-background">苏州宏创包装科技有限公司</div>
    </div>
    <div class="container">
        <div class="blue-background">计量器具名称：</div>
        <div class="white-background no-wrap">空箱抗压试验机</div>
    </div>
    <div class="container">
        <div class="blue-background">型号/规格：</div>
        <div class="white-background">/</div>
    </div>
    <div class="container">
        <div class="blue-background">出厂编号：</div>
        <div class="white-background">/</div>
    </div>
    <div class="container">
        <div class="blue-background">制造单位：</div>
        <div class="white-background">长城仪器有限公司</div>
    </div>
    <div class="container">
        <div class="blue-background">管理编号：</div>
        <div class="white-background">HC-014</div>
    </div>
</body>
</html>
